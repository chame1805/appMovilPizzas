# Aumentamos a 4GB para que Hilt no se quede sin aire
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Activamos el modo paralelo para acelerar la construcción
org.gradle.parallel=true

# Configuraciones estándar de Android
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Esto ayuda a que Compose no sature el emulador en el arranque
android.enableJetifier=true